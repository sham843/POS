<div class="main-layout-container">
  <!-- TOP HEADER -->
  <div class="pos-top-header">
    <div class="header-brand">
      <div class="brand-icon">
        <lucide-icon [img]="Droplets"></lucide-icon>
      </div>
      <div class="brand-name">Dairy Shop POS</div>
    </div>

    <!-- Date Display -->
    <div class="header-date">
      <lucide-icon [img]="Calendar"></lucide-icon>
      <strong>{{ currentTime() | date:'dd MMM yyyy, hh:mm:ss a' }}</strong>
    </div>

    <!-- Push items to the right -->
    <div style="flex: 1"></div>

    <!-- Navigation Links in Header -->
    <div class="header-nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <lucide-icon [img]="PieChart"></lucide-icon>
        <span class="nav-text">Dashboard</span>
      </a>
      <a routerLink="/counter-sale" routerLinkActive="active" class="nav-link">
        <lucide-icon [img]="Monitor"></lucide-icon>
        <span class="nav-text">POS</span>
      </a>
      <a routerLink="/reports" routerLinkActive="active" class="nav-link">
        <lucide-icon [img]="LineChart"></lucide-icon>
        <span class="nav-text">Reports</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-link">
        <lucide-icon [img]="Settings"></lucide-icon>
        <span class="nav-text">Settings</span>
      </a>
    </div>

    <div class="header-actions">
      <!-- Online/Offline Status -->
      <app-network-status></app-network-status>

      <button class="icon-btn outline-btn"><lucide-icon [img]="Sun"></lucide-icon></button>
      
      <!-- Profile Dropdown Container -->
      <div class="profile-menu-container">
        <button class="profile-avatar" (click)="toggleProfileMenu()">
          {{ getAvatarInitial(userDetails()?.name || 'User') }}
        </button>
        
        <!-- Dropdown Menu -->
        <div class="profile-dropdown" *ngIf="showProfileMenu()">
          <div class="dropdown-header">
            <span class="user-name">{{ userDetails()?.name || 'User Name' }}</span>
            <span class="user-role">{{ userDetails()?.userType || 'Admin' }}</span>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item text-danger" (click)="endSession()">
            <lucide-icon [img]="LogOut"></lucide-icon>
            End Session
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ROUTER OUTLET -->
  <div class="layout-content">
    <router-outlet></router-outlet>
  </div>
</div>
