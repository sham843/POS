<div class="drawer-header">
  <div class="header-left">
    <lucide-icon [img]="SettingsIcon" class="header-icon"></lucide-icon>
    <div class="header-titles">
      <h3>Settings</h3>
      <span class="header-subtitle">Configure your POS preferences</span>
    </div>
  </div>
  <button class="close-btn" (click)="close()">
    <lucide-icon [img]="X"></lucide-icon>
  </button>
</div>

<div class="drawer-content">
  <div class="form-container">
    <div class="form-group">
      <label class="field-label">Select Company Ledger <span class="required">*</span></label>
      <mat-form-field appearance="outline" class="full-width no-subscript">
        <mat-select [(ngModel)]="selectedCompanyLedger" placeholder="Select Company Ledger">
          <mat-option *ngFor="let ledger of companyLedgerList" [value]="ledger">
            {{ ledger.customerName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-group">
      <label class="field-label">Select Sale Ledger <span class="required">*</span></label>
      <mat-form-field appearance="outline" class="full-width no-subscript">
        <mat-select [(ngModel)]="selectedSaleLedger" placeholder="Select Sale Ledger">
          <mat-option *ngFor="let ledger of saleLedgerList" [value]="ledger">
            {{ ledger.customerName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-group">
      <label class="field-label">Select Cash Account <span class="required">*</span></label>
      <mat-form-field appearance="outline" class="full-width no-subscript">
        <mat-select [(ngModel)]="selectedCashAccount" placeholder="Select Cash Account">
          <mat-option *ngFor="let cash of cashlist" [value]="cash">
            {{ cash.customerName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-group">
      <label class="field-label">Discount Type <span class="required">*</span></label>
      <mat-form-field appearance="outline" class="full-width no-subscript">
        <mat-select [(ngModel)]="discountType" placeholder="Discount Type">
          <mat-option class="teal small" value="percent">Percentage (%)</mat-option>
          <!-- <mat-option class="teal small" value="amount">Fixed Amount</mat-option> -->
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-group">
      <label class="field-label">Select Godown <span class="required">*</span></label>
      <mat-form-field appearance="outline" class="full-width no-subscript">
        <mat-select [(ngModel)]="selectedGodown" placeholder="Select Godown">
          <mat-option *ngFor="let godown of godownlist" [value]="godown">
            {{ godown.stockYardName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>
</div>

<div class="drawer-footer d-flex justify-content-end gap-2 p-3 bg-white">
  <button class="app-btn btn-secondary" (click)="close()">Cancel</button>
  <button class="app-btn btn-primary d-flex align-items-center gap-2" (click)="save()">
    <lucide-icon [img]="SaveIcon" size="18"></lucide-icon>
    Save Settings
  </button>
</div>
