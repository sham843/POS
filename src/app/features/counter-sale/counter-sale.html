<div class="custom-pos-layout">

  <!-- SUB HEADER (Only for Counter Sale) -->
  <div class="pos-sub-header">
    
    <!-- SEARCH -->
    <div class="sub-header-search">
      <div class="search-box">
        <mat-icon class="search-icon">search</mat-icon>
        <input type="text" [placeholder]="searchType() === 'bill' ? 'Search by Bill No.' : 'Search by Customer Name'">
        <span class="shortcut-key">F2</span>
      </div>
    </div>

    <!-- SEARCH TYPE CHIPS (Segmented Control) -->
    <div class="search-type-chips">
      <div class="chip" 
           [class.active]="searchType() === 'bill'" 
           (click)="setSearchType('bill')">
        <mat-icon>receipt_long</mat-icon>
        <span>Bill No.</span>
      </div>
      <div class="chip" 
           [class.active]="searchType() === 'customer'" 
           (click)="setSearchType('customer')">
        <mat-icon>person_outline</mat-icon>
        <span>Customer</span>
      </div>
    </div>

    <!-- MULTIPLE BILL TABS -->
    <div class="bill-tabs-container">
      <div class="bill-tabs-scroll">
        <div class="bill-tab" 
             *ngFor="let bill of bills()" 
             [class.active]="bill.active"
             (click)="selectBill(bill.id)">
          <span class="bill-name">{{ bill.name }}</span>
          <mat-icon class="close-icon" (click)="removeBill(bill.id, $event)">close</mat-icon>
        </div>
      </div>
      <button class="add-bill-btn" (click)="addBill()" title="New Bill">
        <mat-icon>add</mat-icon>
      </button>
    </div>

  </div>

  <!-- MAIN SPLIT CONTENT -->
  <div class="pos-main-content">
    <div class="pos-left-side">
      <app-product-list></app-product-list>
    </div>
    
    <div class="pos-right-side">
      <div class="cart-section-container">
        <app-cart></app-cart>
      </div>
      <div class="checkout-unified-card">
        <div class="checkout-left-pane">
          <app-bill-summary></app-bill-summary>
        </div>
        <div class="payment-divider-vertical"></div>
        <div class="checkout-right-pane">
          <app-payment></app-payment>
        </div>
      </div>
    </div>
  </div>

</div>
