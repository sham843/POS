<div class="custom-payment-section">
  
  <div class="payment-methods-grid">
    <button class="pay-card cash">
      <div class="card-content">
        <mat-icon>payments</mat-icon>
        <span class="label">Cash</span>
      </div>
      <span class="shortcut">F8</span>
    </button>
    <button class="pay-card upi">
      <div class="card-content">
        <mat-icon>qr_code_scanner</mat-icon>
        <span class="label">UPI</span>
      </div>
      <span class="shortcut">F9</span>
    </button>
    <button class="pay-card card">
      <div class="card-content">
        <mat-icon>credit_card</mat-icon>
        <span class="label">Card</span>
      </div>
      <span class="shortcut">F10</span>
    </button>
    <button class="pay-card credit">
      <div class="card-content">
        <mat-icon>feed</mat-icon>
        <span class="label">Credit</span>
      </div>
      <span class="shortcut">F11</span>
    </button>
  </div>

  <div class="bottom-actions-row">
    <button class="action-btn outline-blue">
      <mat-icon>print</mat-icon>
      <div class="label-shortcut">
        <span class="label">Print Bill</span>
        <span class="shortcut">F6</span>
      </div>
    </button>
    
    <button class="action-btn filled-red">
      <mat-icon>cancel</mat-icon>
      <div class="label-shortcut">
        <span class="label">Cancel Bill</span>
        <span class="shortcut">Esc</span>
      </div>
    </button>
  </div>

</div>
