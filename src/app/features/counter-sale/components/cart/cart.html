<div class="custom-cart">

  <div class="cart-header">
    <div class="cart-title">
      <h3>Cart</h3>
      <span class="item-count">(2 Items)</span>
    </div>
    <button class="clear-cart-btn">
      <mat-icon>delete_outline</mat-icon> Clear Cart
    </button>
  </div>

  <div class="cart-items-list">

    <!-- Cart Item 1 -->
    <div class="cart-item">
      <div class="item-image">
        <i class="fa-solid fa-bottle-droplet" style="color: #93C5FD; font-size: 24px;"></i>
      </div>
      <div class="item-details">
        <div class="item-name">Fresh Milk 1L</div>
        <div class="item-price">₹65.00 / piece</div>
      </div>
      <div class="item-controls-row">
        <div class="item-qty-control">
          <button class="qty-btn minus"><mat-icon>remove</mat-icon></button>
          <span class="qty-val">2</span>
          <button class="qty-btn plus"><mat-icon>add</mat-icon></button>
        </div>
        <input type="number" placeholder="Amt" class="tiny-input" />
        <input type="number" placeholder="Disc %" class="tiny-input" />
      </div>
      <div class="item-total">₹130.00</div>
      <button class="delete-btn"><mat-icon>delete_outline</mat-icon></button>
    </div>

    <!-- Cart Item 2 -->
    <div class="cart-item">
      <div class="item-image">
        <i class="fa-solid fa-cheese" style="color: #FCD34D; font-size: 24px;"></i>
      </div>
      <div class="item-details">
        <div class="item-name">Paneer 200g</div>
        <div class="item-price">₹90.00 / piece</div>
      </div>
      <div class="item-controls-row">
        <div class="item-qty-control">
          <button class="qty-btn minus"><mat-icon>remove</mat-icon></button>
          <span class="qty-val">1</span>

        </div>
        <input type="number" placeholder="Amt" class="tiny-input" />
        <input type="number" placeholder="Disc %" class="tiny-input" />
      </div>
      <div class="item-total">₹90.00</div>
      <button class="delete-btn"><mat-icon>delete_outline</mat-icon></button>
    </div>

    <!-- Cart Item 3 -->
    <div class="cart-item">
      <div class="item-image">
        <i class="fa-solid fa-ice-cream" style="color: #F9A8D4; font-size: 24px;"></i>
      </div>
      <div class="item-details">
        <div class="item-name">Curd 500g</div>
        <div class="item-price">₹45.00 / piece</div>
      </div>
      <div class="item-controls-row">
        <div class="item-qty-control">
          <button class="qty-btn minus"><mat-icon>remove</mat-icon></button>
          <span class="qty-val">1</span>
          <button class="qty-btn plus"><mat-icon>add</mat-icon></button>
        </div>
        <input type="number" placeholder="Amt" class="tiny-input" />

      </div>
      <div class="item-total">₹45.00</div>
      <button class="delete-btn"><mat-icon>delete_outline</mat-icon></button>
    </div>

    <!-- Cart Item 4 -->
    <div class="cart-item">
      <div class="item-image">
        <i class="fa-solid fa-jar" style="color: #FDBA74; font-size: 24px;"></i>
      </div>
      <div class="item-details">
        <div class="item-name">Ghee 500ml</div>
        <div class="item-price">₹350.00 / piece</div>
      </div>
      <div class="item-controls-row">
        <div class="item-qty-control">
          <button class="qty-btn minus"><mat-icon>remove</mat-icon></button>
          <span class="qty-val">1</span>
          <button class="qty-btn plus"><mat-icon>add</mat-icon></button>
        </div>
        <input type="number" placeholder="Amt" class="tiny-input" />
