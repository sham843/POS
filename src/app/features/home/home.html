<div class="home-container">
  <!-- Header / Navbar -->
  <mat-toolbar color="primary" class="home-header">
    <div class="brand">
      <lucide-icon [img]="Store" class="brand-icon"></lucide-icon>
      <span class="brand-name ms-2">Hitech Dairy POS</span>
    </div>

    <span class="spacer"></span>

    <!-- Language Selector -->
    <button mat-button [matMenuTriggerFor]="langMenu" class="me-2">
      <lucide-icon [img]="Globe"></lucide-icon>
      <span class="d-none d-sm-inline ms-1">{{ currentLangLabel }}</span>
    </button>
    <mat-menu #langMenu="matMenu">
      <button mat-menu-item *ngFor="let lang of languages" (click)="setLanguage(lang.code, lang.label)">
        {{ lang.label }}
      </button>
    </mat-menu>

    <!-- Theme Selector -->
    <button mat-icon-button [matMenuTriggerFor]="themeMenu" aria-label="Toggle theme" class="me-2">
      <lucide-icon [img]="Sun" *ngIf="currentTheme === 'light'"></lucide-icon>
      <lucide-icon [img]="Moon" *ngIf="currentTheme === 'dark'"></lucide-icon>
      <lucide-icon [img]="SunMoon" *ngIf="currentTheme === 'system'"></lucide-icon>
    </button>
    <mat-menu #themeMenu="matMenu">
      <button mat-menu-item *ngFor="let theme of themes" (click)="setTheme(theme.code)">
        <lucide-icon [img]="theme.icon"></lucide-icon>
        <span class="ms-2">{{ theme.label }}</span>
      </button>
    </mat-menu>

    <!-- Login Button -->
    <a mat-stroked-button color="primary" routerLink="/login" class="ms-2 login-btn">
      {{ 'HEADER.LOGIN' | translate }}
    </a>
  </mat-toolbar>

  <!-- Hero Section (Content) -->
  <div class="hero-section text-center p-4 p-md-5">
    <h1 class="display-4 fw-bold mb-4">{{ 'HOME.HERO_TITLE' | translate }}</h1>
    <p class="lead text-muted mb-5">{{ 'HOME.HERO_SUBTITLE' | translate }}</p>
    <a mat-flat-button color="primary" routerLink="/login" class="app-primary-btn py-3 px-5 fs-5">
      {{ 'HOME.GET_STARTED' | translate }}
    </a>
  </div>
</div>
