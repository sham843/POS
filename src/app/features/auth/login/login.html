<div class="login-container">
  <div class="login-wrapper shadow-lg">

    <!-- Left Side: Branding / Visuals -->
    <div class="login-branding d-none d-md-flex flex-column justify-content-center align-items-center text-center p-5">
      <div class="brand-overlay"></div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="login-form-section p-4 p-md-5">
      <div class="form-header mb-4">
        <h2 class="fw-bold mb-1">Welcome back</h2>
        <p style="color: var(--text-secondary)">Please enter your details to sign in.</p>
      </div>

      <!-- API Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-4 d-flex align-items-center" role="alert">
        <span class="fs-sm">{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="d-flex flex-column">

        <!-- Username Input -->
        <mat-form-field [appearance]="appearance" class="w-100">
          <mat-label>Username</mat-label>
          <input matInput type="text" placeholder="Enter your username" formControlName="username">
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <!-- Password Input -->
        <mat-form-field [appearance]="appearance" class="w-100">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" placeholder="Enter your password"
            formControlName="password">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" tabindex="-1">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <!-- Remember Me & Forgot Password -->
        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <mat-checkbox formControlName="rememberMe" color="primary">
            <span style="color: var(--text-primary)">Remember me</span>
          </mat-checkbox>
        </div>

        <!-- Submit Button -->
        <button mat-flat-button type="submit" class="w-100 py-4 fw-bold fs-6 mt-2 app-primary-btn">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
