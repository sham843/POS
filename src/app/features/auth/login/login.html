<div class="login-container">
  <div class="login-wrapper shadow-lg">

    <!-- Left Side: Branding / Visuals -->
    <div class="login-branding d-none d-md-flex flex-column justify-content-center align-items-center text-center p-5">
      <div class="brand-overlay"></div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="login-form-section p-4 p-md-5">
      <div class="form-header mb-4">
        <h2 class="fw-bold mb-1">Welcome back</h2>
        <p class="text-muted">Please enter your details to sign in.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="d-flex flex-column">

        <!-- Email Input -->
        <mat-form-field appearance="outline" class="w-100 md-input">
          <mat-label>Email address</mat-label>
          <input matInput type="email" placeholder="name@example.com" formControlName="email">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Please enter a valid email address
          </mat-error>
        </mat-form-field>

        <!-- Password Input -->
        <mat-form-field appearance="outline" class="w-100 md-input">
          <mat-label>Password</mat-label>
          <input matInput type="password" placeholder="Enter your password" formControlName="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <!-- Remember Me & Forgot Password -->
        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <mat-checkbox formControlName="rememberMe" color="primary">
            Remember me
          </mat-checkbox>
          <a href="#" class="text-decoration-none text-primary fw-medium fs-sm">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button mat-flat-button color="primary" type="submit" class="w-100 py-4 fw-bold fs-6">
          Sign In
        </button>
      </form>

      <!-- Footer Text -->
      <div class="text-center mt-4 pt-2">
        <p class="text-muted fs-sm mb-0">Don't have an account? <a href="#"
            class="text-decoration-none text-primary fw-medium">Contact admin</a></p>
      </div>
    </div>
  </div>
</div>
