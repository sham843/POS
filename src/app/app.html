<header class="app-header">
  <div class="logo">
    <h2>{{ title() }}</h2>
  </div>
  <div class="controls">
    <select class="language-switcher" (change)="onLanguageChange($event)">
      @for (lang of languageService.supportedLanguages; track lang.code) {
        <option [value]="lang.code" [selected]="lang.code === languageService.getCurrentLanguage()">
          {{ lang.name }}
        </option>
      }
    </select>
  </div>
</header>

<main class="main-content">
  <div class="card-grid">
    <div class="card">
      <h3>{{ 'HEADER.LOGIN' | translate }}</h3>
      <p>Authenticate into the system.</p>
    </div>
    <div class="card">
      <h3>{{ 'HEADER.LOGOUT' | translate }}</h3>
      <p>End your current session.</p>
    </div>
    <div class="card">
      <h3>{{ 'HEADER.CUSTOMER_SALES' | translate }}</h3>
      <p>Manage customer transactions.</p>
    </div>
    <div class="card">
      <h3>{{ 'HEADER.DASHBOARD' | translate }}</h3>
      <p>View your analytics and stats.</p>
    </div>
  </div>
</main>

<router-outlet />
